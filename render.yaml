services:
  - type: web
    name: university-calci-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=.:.. uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        sync: false
